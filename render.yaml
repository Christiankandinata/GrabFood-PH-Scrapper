services:
  - type: web
    name: grabfood-ph-scraper
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "10000"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/root/.cache/ms-playwright"
    healthCheckPath: /health
    autoDeploy: true
