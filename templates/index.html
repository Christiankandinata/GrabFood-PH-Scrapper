<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrabFood PH Scraper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1a;
            --surface: #111827;
            --surface-hover: #1a2332;
            --border: #1e293b;
            --accent: #00d26a;
            --accent-dim: #00d26a22;
            --accent-glow: #00d26a44;
            --text: #e2e8f0;
            --text-dim: #64748b;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* -- Ambient glow -- */
        body::before {
            content: '';
            position: fixed;
            top: -40%; left: -20%;
            width: 60%; height: 80%;
            background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            opacity: .35;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* -- Header -- */
        header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        header .logo {
            width: 44px; height: 44px;
            background: var(--accent);
            border-radius: 10px;
            display: grid; place-items: center;
            font-family: 'Space Mono', monospace;
            font-weight: 700; font-size: 20px;
            color: var(--bg);
        }
        header h1 {
            font-size: 1.5rem; font-weight: 700;
            letter-spacing: -.02em;
        }
        header h1 span { color: var(--accent); }
        header p {
            color: var(--text-dim); font-size: .85rem;
            margin-left: auto;
            font-family: 'Space Mono', monospace;
        }

        /* -- Cards -- */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: border-color .2s;
        }
        .card:hover { border-color: #2a3a4d; }
        .card-title {
            font-family: 'Space Mono', monospace;
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        /* -- Form controls -- */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }

        label {
            display: block;
            font-size: .8rem;
            color: var(--text-dim);
            margin-bottom: .35rem;
            font-weight: 500;
        }

        select, input[type="number"], input[type="text"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: .65rem .85rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: .9rem;
            transition: border-color .2s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .checkbox-row {
            display: flex; align-items: center; gap: .5rem;
            margin-bottom: 1rem;
        }
        .checkbox-row input[type="checkbox"] {
            accent-color: var(--accent);
            width: 16px; height: 16px;
        }
        .checkbox-row label { margin-bottom: 0; color: var(--text); font-size: .85rem; }

        .custom-coords { display: none; }
        .custom-coords.show { display: grid; }

        .btn {
            display: inline-flex;
            align-items: center; gap: .5rem;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            padding: .7rem 1.5rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: .9rem;
            cursor: pointer;
            transition: all .2s;
        }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        .btn-sm { padding: .45rem 1rem; font-size: .8rem; }

        /* -- Status bar -- */
        .status-bar {
            display: none;
            align-items: center;
            gap: .75rem;
            padding: 1rem 1.25rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: .85rem;
            font-family: 'Space Mono', monospace;
            animation: fadeIn .3s;
        }
        .status-bar.show { display: flex; }
        .status-bar.running {
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        .status-bar.error {
            background: #ef444422;
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        .status-bar.completed {
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid transparent;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

        /* -- Stats row -- */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
            text-align: center;
        }
        .stat-card .num {
            font-family: 'Space Mono', monospace;
            font-size: 1.6rem; font-weight: 700;
            color: var(--accent);
        }
        .stat-card .lbl {
            font-size: .75rem;
            color: var(--text-dim);
            margin-top: .2rem;
        }

        /* -- Results table -- */
        .table-wrap {
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .82rem;
        }
        thead {
            background: var(--bg);
            position: sticky; top: 0;
        }
        th {
            text-align: left;
            padding: .65rem .85rem;
            font-family: 'Space Mono', monospace;
            font-size: .7rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: .6rem .85rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        tr:hover td { background: var(--surface-hover); }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: .7rem;
            font-weight: 600;
        }
        .badge-open { background: #00d26a22; color: var(--accent); }
        .badge-closed { background: #ef444422; color: var(--danger); }

        /* -- Export bar -- */
        .export-bar {
            display: none;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .export-bar.show { display: flex; flex-wrap: wrap; }

        /* -- Empty state -- */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-dim);
        }
        .empty-state svg { margin-bottom: 1rem; opacity: .3; }
        .empty-state p { font-size: .9rem; }

        /* -- Footer -- */
        footer {
            text-align: center;
            padding: 2rem 0 1rem;
            color: var(--text-dim);
            font-size: .75rem;
            font-family: 'Space Mono', monospace;
        }

        /* -- Scrollbar -- */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">G</div>
            <div>
                <h1>Grab<span>Food</span> PH Scraper</h1>
            </div>
            <p>v1.0</p>
        </header>

        <!-- Config Card -->
        <div class="card">
            <div class="card-title">&#9881; Configuration</div>
            <div class="form-row">
                <div>
                    <label for="location">Select Location</label>
                    <select id="location">
                        <option value="" disabled>Loading locations...</option>
                    </select>
                </div>
                <div style="display:flex;align-items:end;">
                    <button class="btn" id="btnScrape" onclick="startScrape()">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        Start Scraping
                    </button>
                </div>
            </div>

            <div class="checkbox-row">
                <input type="checkbox" id="customToggle" onchange="toggleCustom()">
                <label for="customToggle">Use custom coordinates</label>
            </div>
            <div class="form-row custom-coords" id="customCoords">
                <div>
                    <label for="customLat">Latitude</label>
                    <input type="number" id="customLat" step="any" placeholder="e.g. 14.5995">
                </div>
                <div>
                    <label for="customLng">Longitude</label>
                    <input type="number" id="customLng" step="any" placeholder="e.g. 120.9842">
                </div>
            </div>
        </div>

        <!-- Status -->
        <div class="status-bar" id="statusBar">
            <div class="spinner" id="statusSpinner"></div>
            <span id="statusText">Initializing...</span>
        </div>

        <!-- Stats -->
        <div class="stats-row" id="statsRow" style="display:none;">
            <div class="stat-card">
                <div class="num" id="statTotal">0</div>
                <div class="lbl">Merchants Found</div>
            </div>
            <div class="stat-card">
                <div class="num" id="statLocation">—</div>
                <div class="lbl">Location</div>
            </div>
            <div class="stat-card">
                <div class="num" id="statTime">—</div>
                <div class="lbl">Duration</div>
            </div>
        </div>

        <!-- Export bar -->
        <div class="export-bar" id="exportBar">
            <button class="btn btn-sm btn-outline" onclick="exportCSV()">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                Export CSV
            </button>
            <button class="btn btn-sm btn-outline" onclick="exportJSON()">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                Export JSON
            </button>
            <span style="color:var(--text-dim);font-size:.8rem;margin-left:auto;" id="resultInfo"></span>
        </div>

        <!-- Results -->
        <div id="resultsArea">
            <div class="empty-state">
                <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <p>Select a location and click <strong>Start Scraping</strong> to begin.</p>
            </div>
        </div>

        <footer>
            GrabFood PH Merchant Scraper &middot; For market research purposes only
        </footer>
    </div>

    <script>
        let currentJobId = null;
        let pollInterval = null;
        let startTime = null;
        let allMerchants = [];

        // Load locations
        async function loadLocations() {
            try {
                const res = await fetch('/api/locations');
                const data = await res.json();
                const sel = document.getElementById('location');
                sel.innerHTML = '';
                for (const [key, loc] of Object.entries(data)) {
                    const opt = document.createElement('option');
                    opt.value = key;
                    opt.textContent = loc.label;
                    sel.appendChild(opt);
                }
            } catch (e) {
                console.error('Failed to load locations', e);
            }
        }

        function toggleCustom() {
            const el = document.getElementById('customCoords');
            el.classList.toggle('show', document.getElementById('customToggle').checked);
        }

        async function startScrape() {
            const btn = document.getElementById('btnScrape');
            btn.disabled = true;

            const loc = document.getElementById('location').value;
            const useCustom = document.getElementById('customToggle').checked;
            const customLat = document.getElementById('customLat').value;
            const customLng = document.getElementById('customLng').value;

            let url = `/api/scrape?location=${encodeURIComponent(loc)}`;
            if (useCustom && customLat && customLng) {
                url += `&custom_lat=${customLat}&custom_lng=${customLng}`;
            }

            try {
                const res = await fetch(url, { method: 'POST' });
                const data = await res.json();
                currentJobId = data.job_id;
                startTime = Date.now();

                showStatus('running', 'Job queued...');
                document.getElementById('statsRow').style.display = 'grid';
                document.getElementById('exportBar').classList.remove('show');

                // Start polling
                if (pollInterval) clearInterval(pollInterval);
                pollInterval = setInterval(pollStatus, 2000);

            } catch (e) {
                showStatus('error', 'Failed to start scrape: ' + e.message);
                btn.disabled = false;
            }
        }

        async function pollStatus() {
            if (!currentJobId) return;
            try {
                const res = await fetch(`/api/status/${currentJobId}`);
                const data = await res.json();

                document.getElementById('statTotal').textContent = data.count || 0;
                document.getElementById('statLocation').textContent = data.location || '—';

                if (startTime) {
                    const elapsed = Math.round((Date.now() - startTime) / 1000);
                    const m = Math.floor(elapsed / 60);
                    const s = elapsed % 60;
                    document.getElementById('statTime').textContent = m > 0 ? `${m}m ${s}s` : `${s}s`;
                }

                if (data.status === 'running' || data.status === 'queued') {
                    showStatus('running', data.message);
                } else if (data.status === 'completed') {
                    showStatus('completed', data.message);
                    clearInterval(pollInterval);
                    document.getElementById('btnScrape').disabled = false;
                    loadResults();
                } else if (data.status === 'error') {
                    showStatus('error', data.message);
                    clearInterval(pollInterval);
                    document.getElementById('btnScrape').disabled = false;
                }
            } catch (e) {
                console.error('Poll error', e);
            }
        }

        async function loadResults() {
            if (!currentJobId) return;
            try {
                const res = await fetch(`/api/results/${currentJobId}`);
                const data = await res.json();
                allMerchants = data.merchants || [];

                document.getElementById('exportBar').classList.add('show');
                document.getElementById('resultInfo').textContent = `${allMerchants.length} merchants loaded`;

                renderTable(allMerchants);
            } catch (e) {
                console.error('Failed to load results', e);
            }
        }

        function renderTable(merchants) {
            if (!merchants.length) {
                document.getElementById('resultsArea').innerHTML = `
                    <div class="empty-state">
                        <p>No merchants found. Try a different location.</p>
                    </div>`;
                return;
            }

            let html = `<div class="table-wrap"><table>
                <thead><tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Latitude</th>
                    <th>Longitude</th>
                    <th>Cuisines</th>
                    <th>Rating</th>
                    <th>ETA (min)</th>
                    <th>Status</th>
                </tr></thead><tbody>`;

            merchants.forEach((m, i) => {
                const cuisines = (m.cuisines || []).join(', ') || '—';
                const isOpen = m.is_open;
                const badge = isOpen === true
                    ? '<span class="badge badge-open">Open</span>'
                    : isOpen === false
                    ? '<span class="badge badge-closed">Closed</span>'
                    : '—';

                html += `<tr>
                    <td>${i + 1}</td>
                    <td title="${m.name || m.chain_name || ''}">${m.name || m.chain_name || '—'}</td>
                    <td>${m.latitude ?? '—'}</td>
                    <td>${m.longitude ?? '—'}</td>
                    <td title="${cuisines}">${cuisines}</td>
                    <td>${m.rating ?? '—'}</td>
                    <td>${m.estimated_delivery_time ?? '—'}</td>
                    <td>${badge}</td>
                </tr>`;
            });

            html += '</tbody></table></div>';
            document.getElementById('resultsArea').innerHTML = html;
        }

        function showStatus(type, msg) {
            const bar = document.getElementById('statusBar');
            const spinner = document.getElementById('statusSpinner');
            const text = document.getElementById('statusText');
            bar.className = 'status-bar show ' + type;
            spinner.style.display = type === 'running' ? 'block' : 'none';
            text.textContent = msg;
        }

        async function exportCSV() {
            if (!currentJobId) return;
            window.open(`/api/export/${currentJobId}`, '_blank');
        }

        function exportJSON() {
            if (!allMerchants.length) return;
            const blob = new Blob([JSON.stringify(allMerchants, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `grabfood_merchants_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Init
        loadLocations();
    </script>
</body>
</html>
